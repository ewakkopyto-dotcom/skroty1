<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do góry</title>
<style>
  @import url('https://cdn.jsdelivr.net/npm/@fontsource/eb-garamond@5.0.20/index.css');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    width: 100%;
    overflow-x: hidden;
  }

  .dg-outer {
    display: flex;
    justify-content: center;
    padding: 0.5rem 0;
    width: 100%;
  }
  .dg-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    border: 0.5px solid rgba(160, 130, 70, 0.3);
    border-radius: 999px;
    background: transparent;
    text-decoration: none;
    color: #2a2418;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 13px;
    font-style: italic;
    white-space: nowrap;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }
  .dg-btn:hover {
    border-color: rgba(160, 130, 70, 0.6);
    background: rgba(184, 149, 87, 0.06);
    transform: translateY(-1px);
  }
  .dg-btn:active { transform: translateY(0); }
  .dg-arrow {
    color: #b89557;
    transition: transform 0.15s ease;
  }
  .dg-btn:hover .dg-arrow {
    transform: translateY(-2px);
  }
</style>
</head>
<body>

<div class="dg-outer">
  <a class="dg-btn" target="_top"
     href="https://www.notion.so/tomekwilk/Keep-it-simple-keep-it-organized-2-0-35b2e147ffbd80dcb6abe2a8fc41f425">
    <svg class="dg-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 19V5M5 12l7-7 7 7"/>
    </svg>
    Do góry
  </a>
</div>

</body>
</html>
